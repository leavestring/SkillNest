<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillNest — 发现优质 Claude Code 技能</title>
  <meta name="description" content="SkillNest 汇集了最好用的 Claude Code Skills，每个技能配有详细介绍和截图，直达 GitHub 仓库。涵盖代码审查、安全扫描、自动化、效率工具等分类。">
  <meta name="keywords" content="Claude Code, Skills, GitHub, 代码审查, 安全, 自动化, AI编程, 开发工具">
  <meta property="og:title" content="SkillNest — 发现优质 Claude Code 技能">
  <meta property="og:description" content="汇集最好用的 Claude Code Skills，配图、配介绍，直达 GitHub。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_CN">
  <meta name="twitter:card" content="summary">
  <link rel="canonical" href="https://leavestring.github.io/skillnest/">
  <link rel="stylesheet" href="css/skillnest.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "SkillNest",
    "description": "发现优质 Claude Code 技能",
    "url": "https://leavestring.github.io/skillnest/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://leavestring.github.io/skillnest/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>
<body>

  <!-- Floating decorative elements -->
  <div class="bg-decoration">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
  </div>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-shapes" aria-hidden="true">
      <div class="hero-shape hero-shape-1"></div>
      <div class="hero-shape hero-shape-2"></div>
      <div class="hero-shape hero-shape-3"></div>
    </div>
    <div class="logo">
      <span class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </span>
      SkillNest
    </div>
    <p class="hero-subtitle">发现优质 Claude Code 技能，一键直达 GitHub</p>
    <p class="hero-quote">「工欲善其事，必先利其器」</p>
    <div class="hero-action">
      <a href="skills/submit.html" class="btn-hero-submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        提交技能
      </a>
    </div>
    <div class="hero-stats" id="heroStats">
      <div class="hero-stat"><div class="hero-stat-num">—</div><div class="hero-stat-label">收录技能</div></div>
      <div class="hero-stat"><div class="hero-stat-num">—</div><div class="hero-stat-label">分类</div></div>
      <div class="hero-stat"><div class="hero-stat-num">—</div><div class="hero-stat-label">社区关注</div></div>
    </div>
  </header>

  <!-- Search -->
  <section class="toolbar">
    <div class="search-wrap" role="search">
      <span class="search-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="搜索技能名称、描述、标签…"
        aria-label="搜索技能"
        autocomplete="off"
      >
      <button id="searchClear" class="search-clear" aria-label="清除搜索">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </section>

  <!-- Filters -->
  <nav class="filter-bar" id="filterBar" aria-label="按分类筛选"></nav>

  <!-- Result count -->
  <p class="result-count" id="resultCount" aria-live="polite"></p>

  <!-- Card Grid -->
  <main class="card-grid" id="cardGrid" aria-label="技能列表"></main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <p class="footer-brand"><span class="footer-brand-name">SkillNest</span><span class="footer-brand-divider"></span><span class="footer-brand-tagline">社区驱动的 Claude Code 技能目录</span></p>
      <p class="footer-links">
        <a href="sitemap.xml">Sitemap</a>
        <span>·</span>
        <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
      </p>
      <p class="footer-quote">「积众人之智，成众人之事」</p>
      <p class="footer-copy">收录的技能归原作者所有</p>
    </div>
  </footer>

  <script src="js/skillnest.js"></script>
</body>
</html>
